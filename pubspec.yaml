name: dionysus_emotion
description: "Emotional monitoring app for parents of premature babies in the NICU"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Database (SQLite via Drift)
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Typography
  google_fonts: ^6.2.1

  # Security (app lock: PIN + biometrics)
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.5

  # Home screen widget (Android) — interactive emotion entry
  home_widget: ^0.7.0

  # Ouverture de liens externes (ressources d'aide dans l'écran de validation)
  url_launcher: ^6.3.2

  # Co-parent sharing (remote backend, anonymous auth, realtime)
  supabase_flutter: ^2.8.0
  # QR pairing
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation for Drift
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

  # Génération des icônes de lancement à partir de assets/icon/app_icon.png
  flutter_launcher_icons: ^0.14.1

# Icône de l'app : exécuter `dart run flutter_launcher_icons` après modification.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - docs/sentences.txt
