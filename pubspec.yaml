name: dionysus_emotion
description: "Emotional monitoring app for parents of premature babies in the NICU"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Database (SQLite via Drift)
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Typography
  google_fonts: ^6.2.1

  # Security (app lock: PIN + biometrics)
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.5

  # Home screen widget (Android) — interactive emotion entry
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation for Drift
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - docs/sentences.txt
